<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Login</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>CRM System</h1>
    <p class="subtitle">Customer Inward / Outward &amp; Work Allocation</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">User ID</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <div id="alert" class="alert alert-error" hidden></div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <p class="login-hint">Default admin: <code>admin</code> / password from .env</p>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (async () => {
      try {
        const { user } = await API.me();
        window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/staff/dashboard.html';
      } catch { /* not logged in */ }
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      hideAlert(alert);
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      try {
        const { user } = await API.login(username, password);
        window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/staff/dashboard.html';
      } catch (err) {
        showAlert(alert, err.message);
      }
    });
  </script>
</body>
</html>
