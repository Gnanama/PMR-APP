services:
  - type: web
    name: crm-website
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /login.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
    disk:
      name: crm-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
